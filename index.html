<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

    <header class="bg-blue-600 text-white shadow-md">
        <div class="container mx-auto px-4 py-6 flex justify-between items-center">
            <h1 class="text-3xl font-bold flex items-center gap-2">
                💰 Crypto Tracker
            </h1>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">

        <div id="loading-container" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-blue-600"></div>
            <p class="mt-4 text-xl text-gray-600 font-medium">Fetching cryptocurrencies...</p>
        </div>

        <div id="error-container" class="hidden flex flex-col items-center justify-center py-20 text-red-500">
            <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <p id="error-message" class="text-xl font-medium">Failed to load data. Please try again later.</p>
            <button id="retry-btn"
                class="mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">Retry</button>
        </div>

        <div id="crypto-container" class="hidden">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="crypto-grid">
            </div>
        </div>

    </main>

    <footer class="bg-gray-800 text-white py-6 mt-12 text-center">
        <p>CryptoCapstone - Milestone 2</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
